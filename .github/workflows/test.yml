name: M1 Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Reproducible self-hosting pipeline:
  #   bootstrap m0c (C) -> compile m1c.m0 -> self-hosted m1c -> compile+run tests.
  # Builds everything from source (no reliance on the committed m1c.exe) and runs the
  # full temporal test suite, exiting non-zero on any failure. The script prints the
  # generated C + stderr for any failing test, so this log is self-explanatory.
  selfhost-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc python3

      - name: Versions
        run: |
          gcc --version | head -n1
          python3 --version
          bash --version | head -n1

      - name: Build self-hosted m1c and run the temporal test suite
        run: |
          chmod +x src/m1/build_selfhost.sh
          bash src/m1/build_selfhost.sh

      - name: Upload generated C/diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: selfhost-artifacts
          path: |
            /tmp/m1build/*.c
            /tmp/m1build/*.err
          retention-days: 7
          if-no-files-found: ignore
