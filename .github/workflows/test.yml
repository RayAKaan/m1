name: M1 Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  selfhost-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc python3

      - name: Show versions
        run: |
          gcc --version
          python3 --version

      - name: Build self-hosted m1c and run test suite
        run: |
          chmod +x src/m1/build_selfhost.sh
          bash src/m1/build_selfhost.sh

      - name: Upload generated C on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: selfhost-artifacts
          path: |
            /tmp/m1build/*.c
            /tmp/m1build/*.err
          retention-days: 7
          if-no-files-found: ignore
